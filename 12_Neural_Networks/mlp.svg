<svg viewBox="0 0 1050 650" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background-color:#ffffff; font-family:'Virgil', 'Comic Sans MS', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 1,1 L 9,5 L 1,9" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchy)" />
    </marker>
  </defs>

  <style>
    /* Excalidraw specific styles */
    .title { font-size: 32px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; letter-spacing: 1px; }
    .label { font-size: 22px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .node-text { font-size: 18px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; font-style: italic; }
    .note-text { font-size: 15px; fill: #1e1e1e; }
    .math-text { font-size: 16px; font-weight: bold; fill: #e8590c; }
    
    /* Nodes */
    .node-in { fill: #e7f5ff; stroke: #1971c2; stroke-width: 2.5; filter: url(#sketchy); }
    .node-hid { fill: #fff4e6; stroke: #e8590c; stroke-width: 2.5; filter: url(#sketchy); }
    .node-out { fill: #ebfbee; stroke: #2b8a3e; stroke-width: 2.5; filter: url(#sketchy); }
    
    /* Connectors */
    .weight { fill: none; stroke: #adb5bd; stroke-width: 1.5; filter: url(#sketchy); opacity: 0.4; }
    .weight-highlight { fill: none; stroke: #1e1e1e; stroke-width: 2.5; filter: url(#sketchy); opacity: 0.9; }
    
    /* Boxes & Notes */
    .container-box { fill: none; stroke: #1e1e1e; stroke-width: 2; stroke-dasharray: 10 10; filter: url(#sketchy); rx: 15px; }
    .sticky-note { fill: #fff9db; stroke: #fcc419; stroke-width: 2; filter: url(#sketchy); rx: 4px; }
  </style>

  <text x="525" y="50" class="title" filter="url(#sketchy)">Multi-Layer Perceptron (MLP)</text>
  <text x="525" y="75" font-size="16" fill="#495057" text-anchor="middle" filter="url(#sketchy)">"The Classic Fully-Connected Neural Network"</text>

  <rect x="80" y="110" width="140" height="380" class="container-box" />
  <text x="150" y="145" class="label" fill="#1971c2">Input Layer</text>

  <rect x="330" y="110" width="380" height="480" class="container-box" />
  <text x="520" y="145" class="label" fill="#e8590c">Hidden Layers</text>
  <text x="520" y="165" font-size="14" fill="#e8590c" text-anchor="middle" filter="url(#sketchy)">(Where the magic happens)</text>

  <rect x="820" y="110" width="140" height="380" class="container-box" />
  <text x="890" y="145" class="label" fill="#2b8a3e">Output Layer</text>

  <g class="connections">
    <path d="M 150,230 L 410,230" class="weight" /><path d="M 150,230 L 410,310" class="weight" /><path d="M 150,230 L 410,390" class="weight" /><path d="M 150,230 L 410,470" class="weight" />
    <path d="M 150,310 L 410,230" class="weight" /><path d="M 150,310 L 410,310" class="weight" /><path d="M 150,310 L 410,390" class="weight" /><path d="M 150,310 L 410,470" class="weight" />
    <path d="M 150,390 L 410,230" class="weight" /><path d="M 150,390 L 410,310" class="weight" /><path d="M 150,390 L 410,390" class="weight" /><path d="M 150,390 L 410,470" class="weight" />

    <path d="M 410,230 L 630,230" class="weight" /><path d="M 410,230 L 630,310" class="weight" /><path d="M 410,230 L 630,390" class="weight" /><path d="M 410,230 L 630,470" class="weight" />
    <path d="M 410,310 L 630,230" class="weight" /><path d="M 410,310 L 630,310" class="weight" /><path d="M 410,310 L 630,390" class="weight" /><path d="M 410,310 L 630,470" class="weight" />
    <path d="M 410,390 L 630,230" class="weight" /><path d="M 410,390 L 630,310" class="weight" /><path d="M 410,390 L 630,390" class="weight" /><path d="M 410,390 L 630,470" class="weight" />
    <path d="M 410,470 L 630,230" class="weight" /><path d="M 410,470 L 630,310" class="weight" /><path d="M 410,470 L 630,390" class="weight" /><path d="M 410,470 L 630,470" class="weight" />

    <path d="M 630,230 L 890,270" class="weight" /><path d="M 630,230 L 890,350" class="weight" />
    <path d="M 630,310 L 890,270" class="weight" /><path d="M 630,310 L 890,350" class="weight" />
    <path d="M 630,390 L 890,270" class="weight" /><path d="M 630,390 L 890,350" class="weight" />
    <path d="M 630,470 L 890,270" class="weight" /><path d="M 630,470 L 890,350" class="weight" />
    
    <path d="M 150,230 L 410,310 L 630,390 L 890,350" class="weight-highlight" stroke-dasharray="6 4"/>
  </g>

  <circle cx="150" cy="230" r="28" class="node-in" />
  <text x="150" y="236" class="node-text">X₁</text>
  
  <circle cx="150" cy="310" r="28" class="node-in" />
  <text x="150" y="316" class="node-text">X₂</text>
  
  <circle cx="150" cy="390" r="28" class="node-in" />
  <text x="150" y="396" class="node-text">X₃</text>


  <circle cx="410" cy="230" r="28" class="node-hid" />
  <text x="410" y="236" class="node-text">h₁</text>
  
  <circle cx="410" cy="310" r="28" class="node-hid" />
  <text x="410" y="316" class="node-text">h₂</text>
  
  <circle cx="410" cy="390" r="28" class="node-hid" />
  <text x="410" y="396" class="node-text">h₃</text>
  
  <circle cx="410" cy="470" r="28" class="node-hid" />
  <text x="410" y="476" class="node-text">h₄</text>


  <circle cx="630" cy="230" r="28" class="node-hid" />
  <text x="630" y="236" class="node-text">h₅</text>
  
  <circle cx="630" cy="310" r="28" class="node-hid" />
  <text x="630" y="316" class="node-text">h₆</text>
  
  <circle cx="630" cy="390" r="28" class="node-hid" />
  <text x="630" y="396" class="node-text">h₇</text>
  
  <circle cx="630" cy="470" r="28" class="node-hid" />
  <text x="630" y="476" class="node-text">h₈</text>


  <circle cx="890" cy="270" r="28" class="node-out" />
  <text x="890" y="276" class="node-text">Ŷ₁</text>
  
  <circle cx="890" cy="350" r="28" class="node-out" />
  <text x="890" y="356" class="node-text">Ŷ₂</text>


  <rect x="360" y="520" width="320" height="100" class="sticky-note" fill="#e3fafc" stroke="#1098ad"/>
  <text x="520" y="550" class="node-text">"Dense / Fully Connected"</text>
  <text x="520" y="575" class="note-text" text-anchor="middle">Notice how EVERY node connects</text>
  <text x="520" y="595" class="note-text" text-anchor="middle">to EVERY node in the next layer!</text>

  <rect x="740" y="450" width="260" height="110" class="sticky-note" fill="#fff0f6" stroke="#c2255c"/>
  <text x="870" y="480" class="node-text">Inside every node:</text>
  <text x="870" y="505" class="math-text" text-anchor="middle">z = Σ(w·x) + b</text>
  <text x="870" y="530" class="math-text" fill="#2b8a3e" text-anchor="middle">output = Activation(z)</text>
  <path d="M 830,450 Q 800,420 660,390" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)" filter="url(#sketchy)"/>

</svg>
