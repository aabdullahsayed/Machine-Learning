<svg viewBox="0 0 1050 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background-color:#ffffff; font-family:'Virgil', 'Comic Sans MS', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 L 9,5 L 1,9" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchy)" />
    </marker>
  </defs>

  <style>
    /* Excalidraw specific styles */
    .title { font-size: 32px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; letter-spacing: 1px; }
    .label { font-size: 20px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .node-text { font-size: 16px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .note-text { font-size: 14px; fill: #1e1e1e; }
    
    /* Nodes */
    .node-in { fill: #e7f5ff; stroke: #1971c2; stroke-width: 2.5; filter: url(#sketchy); }
    .node-hid { fill: #fff4e6; stroke: #e8590c; stroke-width: 2.5; filter: url(#sketchy); }
    .node-out { fill: #ebfbee; stroke: #2b8a3e; stroke-width: 2.5; filter: url(#sketchy); }
    
    /* Connectors */
    .weight { fill: none; stroke: #868e96; stroke-width: 1.5; filter: url(#sketchy); opacity: 0.7; marker-end: url(#arrow); }
    .weight-thick { fill: none; stroke: #1e1e1e; stroke-width: 3.5; filter: url(#sketchy); marker-end: url(#arrow); }
    
    /* Boxes & Notes */
    .container-box { fill: none; stroke: #1e1e1e; stroke-width: 2; stroke-dasharray: 8 8; filter: url(#sketchy); rx: 15px; }
    .sticky-note { fill: #fff9db; stroke: #fcc419; stroke-width: 2; filter: url(#sketchy); rx: 4px; }
  </style>

  <text x="525" y="50" class="title" filter="url(#sketchy)">🧠 Neural Network </text>
  <path d="M 380,65 Q 525,55 670,65" fill="none" stroke="#1e1e1e" stroke-width="2" filter="url(#sketchy)"/>

  <rect x="120" y="100" width="160" height="420" class="container-box" opacity="0.4"/>
  <text x="200" y="130" class="label" fill="#1971c2">Input Layer</text>

  <rect x="420" y="130" width="160" height="360" class="container-box" opacity="0.4"/>
  <text x="500" y="160" class="label" fill="#e8590c">Hidden Layer</text>

  <rect x="720" y="200" width="180" height="220" class="container-box" opacity="0.4"/>
  <text x="810" y="230" class="label" fill="#2b8a3e">Output Layer</text>

  <g class="connections">
    <path d="M 235,210 Q 350,190 465,220" class="weight" />
    <path d="M 235,210 Q 350,260 465,310" class="weight-thick" /> <path d="M 235,210 Q 350,300 465,400" class="weight" />

    <path d="M 235,310 Q 350,260 465,220" class="weight-thick" /> <path d="M 235,310 Q 350,310 465,310" class="weight" />
    <path d="M 235,310 Q 350,350 465,400" class="weight" />

    <path d="M 235,410 Q 350,310 465,220" class="weight-thick" /> <path d="M 235,410 Q 350,360 465,310" class="weight" />
    <path d="M 235,410 Q 350,410 465,400" class="weight" />

    <path d="M 535,220 Q 640,250 770,280" class="weight-thick" />
    <path d="M 535,220 Q 640,300 770,350" class="weight" />
    
    <path d="M 535,310 Q 640,290 770,280" class="weight" />
    <path d="M 535,310 Q 640,330 770,350" class="weight-thick" />
    
    <path d="M 535,400 Q 640,340 770,280" class="weight" />
    <path d="M 535,400 Q 640,370 770,350" class="weight" />
  </g>

  <circle cx="200" cy="210" r="35" class="node-in" />
  <text x="200" y="205" class="node-text">Pointy</text>
  <text x="200" y="225" class="node-text">Ears</text>

  <circle cx="200" cy="310" r="35" class="node-in" />
  <text x="200" y="315" class="node-text">Barks</text>

  <circle cx="200" cy="410" r="35" class="node-in" />
  <text x="200" y="405" class="node-text">Wags</text>
  <text x="200" y="425" class="node-text">Tail</text>

  <circle cx="500" cy="220" r="35" class="node-hid" />
  <text x="500" y="215" class="node-text" font-size="14">Dog</text>
  <text x="500" y="235" class="node-text" font-size="14">Patterns</text>

  <circle cx="500" cy="310" r="35" class="node-hid" />
  <text x="500" y="305" class="node-text" font-size="14">Cat</text>
  <text x="500" y="325" class="node-text" font-size="14">Patterns</text>

  <circle cx="500" cy="400" r="35" class="node-hid" />
  <text x="500" y="405" class="node-text" font-size="20">?</text>

  <circle cx="810" cy="280" r="40" class="node-out" />
  <text x="810" y="275" class="node-text">🐶 Dog</text>
  <text x="810" y="295" class="node-text" font-size="12" fill="#2b8a3e">(92%)</text>

  <circle cx="810" cy="350" r="40" class="node-out" />
  <text x="810" y="345" class="node-text">🐱 Cat</text>
  <text x="810" y="365" class="node-text" font-size="12" fill="#e8590c">(8%)</text>


  <rect x="25" y="450" width="150" height="90" class="sticky-note"/>
  <text x="100" y="475" class="node-text">Raw Data</text>
  <text x="100" y="495" class="note-text" text-anchor="middle">Feed the features</text>
  <text x="100" y="515" class="note-text" text-anchor="middle">in here!</text>
  <path d="M 175,480 Q 200,470 200,455" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)" filter="url(#sketchy)"/>

  <rect x="300" y="480" width="200" height="90" class="sticky-note" fill="#e3fafc" stroke="#1098ad"/>
  <text x="400" y="505" class="node-text">Weights (Lines)</text>
  <text x="400" y="525" class="note-text" text-anchor="middle">Thick line = High importance!</text>
  <text x="400" y="545" class="note-text" text-anchor="middle">The network learns these.</text>

  <rect x="800" y="450" width="180" height="90" class="sticky-note" fill="#fff0f6" stroke="#c2255c"/>
  <text x="890" y="475" class="node-text">Prediction</text>
  <text x="890" y="495" class="note-text" text-anchor="middle">The node with the</text>
  <text x="890" y="515" class="note-text" text-anchor="middle">highest score wins.</text>
  <path d="M 890,450 Q 890,420 850,400" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)" filter="url(#sketchy)"/>

</svg>
