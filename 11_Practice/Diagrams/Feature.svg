<svg viewBox="10 10 940 380" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background-color:#ffffff; font-family:'Virgil', 'Comic Sans MS', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1,1 L 9,5 L 1,9" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#sketchy)" />
    </marker>
  </defs>

  <style>
    /* Excalidraw specific styles */
    .title { font-size: 24px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; letter-spacing: 0.5px; }
    .label { font-size: 18px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .node-text { font-size: 16px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .note-text { font-size: 14px; fill: #1e1e1e; }
    .math-text { font-size: 16px; font-family: 'Times New Roman', serif; font-style: italic; }
    
    /* Shapes */
    .box { fill: #f8f9fa; stroke: #1e1e1e; stroke-width: 2.5; filter: url(#sketchy); rx: 8px; }
    .raw-data-box { fill: #f1f3f5; stroke: #868e96; stroke-width: 2; filter: url(#sketchy); }
    .process-arrow { fill: none; stroke: #339af0; stroke-width: 4; marker-end: url(#arrow); filter: url(#sketchy); }
    .grid-line { stroke: #1e1e1e; stroke-width: 1.5; fill: none; filter: url(#sketchy); }
    
    /* Sticky Notes */
    .sticky-note-yellow { fill: #fff9db; stroke: #fcc419; stroke-width: 2; filter: url(#sketchy); rx: 4px; }
    .sticky-note-red { fill: #fff0f6; stroke: #ff8787; stroke-width: 2; filter: url(#sketchy); rx: 4px; }
  </style>

  <rect x="30" y="70" width="200" height="180" class="raw-data-box" />
  <text x="130" y="55" class="title">1. Raw Data</text>
  
  <path d="M 45,90 L 170,95 M 45,110 L 210,110 M 45,130 L 120,135 M 45,150 L 190,145 M 45,170 L 150,175 M 45,190 L 200,185 M 45,210 L 140,210 M 45,230 L 180,225" stroke="#adb5bd" stroke-width="3" stroke-dasharray="8 4" filter="url(#sketchy)"/>
  
  <text x="130" y="275" class="note-text" text-anchor="middle">(Messy Server Logs,</text>
  <text x="130" y="295" class="note-text" text-anchor="middle">Timestamps, Text)</text>

  <path d="M 250,160 C 300,100 370,100 420,160" class="process-arrow" />
  <text x="335" y="100" class="label" fill="#1971c2">Feature Engineering</text>
  <text x="335" y="120" class="note-text" text-anchor="middle">Creativity &amp; Domain Knowledge</text>
  
  <circle cx="335" cy="180" r="25" fill="none" stroke="#1e1e1e" stroke-width="2.5" filter="url(#sketchy)" stroke-dasharray="6 4" />
  <path d="M 320,165 L 350,195 M 350,165 L 320,195" stroke="#1e1e1e" stroke-width="2.5" filter="url(#sketchy)" />

  <text x="640" y="55" class="title">2. Structured Dataset</text>
  
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="380" height="180" class="box" />
    
    <path d="M 0,40 L 380,40 M 80,0 L 80,180 M 180,0 L 180,180 M 280,0 L 280,180 M 0,85 L 380,85 M 0,130 L 380,130" class="grid-line" />
    
    <text x="40" y="25" class="node-text">User</text>
    <text x="130" y="25" class="node-text" fill="#1971c2">Price</text>
    <text x="230" y="25" class="node-text" fill="#1971c2">Freq.</text>
    <text x="330" y="25" class="node-text" fill="#e03131">Stay?</text>
    
    <text x="130" y="40" font-size="12" text-anchor="middle" fill="#868e96">Feature <tspan class="math-text">x</tspan>⁽¹⁾</text>
    <text x="230" y="40" font-size="12" text-anchor="middle" fill="#868e96">Feature <tspan class="math-text">x</tspan>⁽²⁾</text>
    <text x="330" y="40" font-size="12" text-anchor="middle" fill="#868e96">Label <tspan class="math-text">y</tspan></text>

    <text x="40" y="65" class="note-text" text-anchor="middle">u101</text>
    <text x="130" y="65" class="note-text" text-anchor="middle">$15</text>
    <text x="230" y="65" class="note-text" text-anchor="middle">12/wk</text>
    <text x="330" y="65" class="note-text" text-anchor="middle" font-weight="bold" fill="#2b8a3e">Yes</text>

    <text x="40" y="110" class="note-text" text-anchor="middle">u102</text>
    <text x="130" y="110" class="note-text" text-anchor="middle">$5</text>
    <text x="230" y="110" class="note-text" text-anchor="middle">1/wk</text>
    <text x="330" y="110" class="note-text" text-anchor="middle" font-weight="bold" fill="#e03131">No</text>
    
    <text x="190" y="160" class="note-text" text-anchor="middle" font-style="italic">... 1000s of rows (Feature Vectors) ...</text>
  </g>

  <rect x="520" y="270" width="180" height="90" class="sticky-note-yellow" />
  <text x="610" y="295" class="node-text" fill="#e8590c">Predictive Power</text>
  <text x="610" y="315" class="note-text" text-anchor="middle">How useful a feature is</text>
  <text x="610" y="335" class="note-text" text-anchor="middle">for guessing the label.</text>
  <path d="M 610,270 Q 580,240 540,200" fill="none" stroke="#fcc419" stroke-width="2" marker-end="url(#arrow)" filter="url(#sketchy)"/>

  <rect x="730" y="270" width="180" height="90" class="sticky-note-red" />
  <text x="820" y="295" class="node-text" fill="#e03131">Low Bias Model</text>
  <text x="820" y="315" class="note-text" text-anchor="middle">A model that makes few</text>
  <text x="820" y="335" class="note-text" text-anchor="middle">mistakes on this data.</text>

</svg>
