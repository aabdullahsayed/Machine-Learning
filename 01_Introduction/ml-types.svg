<svg viewBox="0 0 1000 700" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background-color:#ffffff; font-family:'Virgil', 'Comic Sans MS', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1,1 L 9,5 L 1,9" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#sketchy)" />
    </marker>
  </defs>

  <style>
    .border { fill: none; stroke: #1e1e1e; stroke-width: 3; filter: url(#sketchy); rx: 12; }
    .box { fill: #f8f9fa; stroke: #1e1e1e; stroke-width: 2.5; filter: url(#sketchy); rx: 6; }
    .title { font-size: 22px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; letter-spacing: 0.5px; }
    .subtitle { font-size: 16px; font-style: italic; fill: #495057; text-anchor: middle; }
    .text-main { font-size: 18px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .text-sub { font-size: 15px; fill: #1e1e1e; text-anchor: middle; }
    .arrow-line { fill: none; stroke: #1e1e1e; stroke-width: 2.5; marker-end: url(#arrow); filter: url(#sketchy); }
    .math { font-family: 'Times New Roman', serif; font-style: italic; }
  </style>

  <rect class="border" x="10" y="10" width="480" height="330" />
  <line x1="10" y1="50" x2="490" y2="52" stroke="#1e1e1e" stroke-width="2.5" filter="url(#sketchy)" />
  <text x="250" y="36" class="title">1. SUPERVISED LEARNING</text>

  <rect class="box" fill="#e7f5ff" x="130" y="70" width="240" height="60" />
  <text x="250" y="95" class="text-main">Labeled Dataset</text>
  <text x="250" y="115" class="text-sub">{ (<tspan class="math">x</tspan>i, <tspan class="math">y</tspan>i) }</text>

  <path d="M 250,130 L 250,155" class="arrow-line" />

  <rect class="box" x="130" y="160" width="240" height="40" />
  <text x="250" y="185" class="text-main">Learning Algorithm</text>

  <path d="M 250,200 L 250,225" class="arrow-line" />

  <rect class="box" fill="#fff4e6" x="170" y="230" width="160" height="60" />
  <text x="250" y="255" class="text-main">Model</text>
  <text x="250" y="275" class="text-sub">(Takes <tspan class="math">x</tspan>, deduces <tspan class="math">y</tspan>)</text>

  <text x="90" y="265" class="text-main">Input <tspan class="math">x</tspan></text>
  <path d="M 125,260 L 160,260" class="arrow-line" />
  
  <path d="M 340,260 L 375,260" class="arrow-line" />
  <text x="430" y="255" class="text-main">Label <tspan class="math">y</tspan></text>
  <text x="430" y="275" class="text-sub">(Class or Real)</text>


  <rect class="border" x="510" y="10" width="480" height="330" />
  <line x1="510" y1="50" x2="990" y2="48" stroke="#1e1e1e" stroke-width="2.5" filter="url(#sketchy)" />
  <text x="750" y="36" class="title">2. UNSUPERVISED LEARNING</text>

  <rect class="box" fill="#e7f5ff" x="630" y="70" width="240" height="60" />
  <text x="750" y="95" class="text-main">Unlabeled Dataset</text>
  <text x="750" y="115" class="text-sub">{ <tspan class="math">x</tspan>i }</text>

  <path d="M 750,130 L 750,155" class="arrow-line" />

  <rect class="box" x="630" y="160" width="240" height="40" />
  <text x="750" y="185" class="text-main">Learning Algorithm</text>

  <path d="M 750,200 L 750,225" class="arrow-line" />

  <rect class="box" fill="#fff4e6" x="660" y="230" width="180" height="60" />
  <text x="750" y="255" class="text-main">Model</text>
  <text x="750" y="275" class="text-sub">(Transforms <tspan class="math">x</tspan>)</text>

  <text x="590" y="265" class="text-main">Input <tspan class="math">x</tspan></text>
  <path d="M 625,260 L 650,260" class="arrow-line" />
  
  <path d="M 850,260 L 875,260" class="arrow-line" />
  <text x="930" y="250" class="text-sub">Cluster ID or</text>
  <text x="930" y="268" class="text-sub">Smaller <tspan class="math">x</tspan> or</text>
  <text x="930" y="286" class="text-sub">Outlier score</text>


  <rect class="border" x="10" y="360" width="480" height="330" />
  <line x1="10" y1="400" x2="490" y2="402" stroke="#1e1e1e" stroke-width="2.5" filter="url(#sketchy)" />
  <text x="250" y="386" class="title">3. SEMI-SUPERVISED LEARNING</text>

  <rect class="box" fill="#e7f5ff" x="80" y="420" width="340" height="70" />
  <text x="250" y="445" class="text-main">Mixed Dataset</text>
  <text x="250" y="465" class="text-sub">Few { (<tspan class="math">x</tspan>i, <tspan class="math">y</tspan>i) } + Many Unlabeled { <tspan class="math">x</tspan>i }</text>
  
  <text x="250" y="510" class="subtitle">"Adds info: reflects the probability distribution"</text>

  <path d="M 250,515 L 250,535" class="arrow-line" />

  <rect class="box" x="130" y="540" width="240" height="40" />
  <text x="250" y="565" class="text-main">Learning Algorithm</text>

  <path d="M 250,580 L 250,605" class="arrow-line" />

  <rect class="box" fill="#d3f9d8" x="150" y="610" width="200" height="60" />
  <text x="250" y="635" class="text-main">Better Model</text>
  <text x="250" y="655" class="text-sub">(Leverages unlabeled data)</text>

  <text x="90" y="645" class="text-main">Input <tspan class="math">x</tspan></text>
  <path d="M 120,640 L 140,640" class="arrow-line" />
  <path d="M 360,640 L 380,640" class="arrow-line" />
  <text x="430" y="645" class="text-main">Label <tspan class="math">y</tspan></text>


  <rect class="border" x="510" y="360" width="480" height="330" />
  <line x1="510" y1="400" x2="990" y2="398" stroke="#1e1e1e" stroke-width="2.5" filter="url(#sketchy)" />
  <text x="750" y="386" class="title">4. REINFORCEMENT LEARNING</text>

  <rect class="box" fill="#fff4e6" x="650" y="420" width="200" height="70" />
  <text x="750" y="445" class="text-main">Machine (Agent)</text>
  <text x="750" y="465" class="text-sub">Goal: Maximize expected</text>
  <text x="750" y="480" class="text-sub">average reward</text>

  <rect class="box" fill="#e7f5ff" x="650" y="580" width="200" height="60" />
  <text x="750" y="605" class="text-main">Environment</text>
  <text x="750" y="625" class="text-sub">(Sequential decision making)</text>

  <path d="M 860,455 Q 960,515 860,605" class="arrow-line" stroke-dasharray="6 4" />
  <text x="910" y="530" class="text-main" text-anchor="start">Optimal Action</text>
  <text x="910" y="550" class="text-sub" text-anchor="start">(via Policy)</text>

  <path d="M 640,605 Q 540,515 640,455" class="arrow-line" stroke-dasharray="6 4" />
  <text x="590" y="520" class="text-main" text-anchor="end">State <tspan class="text-sub">(vector </tspan><tspan class="math">x</tspan><tspan class="text-sub">)</tspan></text>
  <text x="590" y="540" class="text-main" text-anchor="end">+ Reward</text>

  <rect class="box" x="700" y="505" width="100" height="30" />
  <text x="750" y="525" class="text-main">Policy</text>
</svg>
