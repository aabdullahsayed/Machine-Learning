<svg viewBox="0 0 1050 850" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background-color:#ffffff; font-family:'Virgil', 'Comic Sans MS', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1,1 L 9,5 L 1,9" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#sketchy)" />
    </marker>
  </defs>

  <style>
    /* Excalidraw specific styles */
    .card-border { fill: none; stroke: #1e1e1e; stroke-width: 3; filter: url(#sketchy); rx: 12px; }
    .title { font-size: 24px; font-weight: bold; fill: #1e1e1e; letter-spacing: 1px; }
    .subtitle { font-size: 16px; fill: #495057; font-style: italic; }
    .label { font-size: 16px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    .desc { font-size: 15px; fill: #1e1e1e; text-anchor: middle; }
    
    .box { fill: #f8f9fa; stroke: #1e1e1e; stroke-width: 2; filter: url(#sketchy); rx: 6px; }
    .model-box { fill: #e7f5ff; stroke: #1e1e1e; stroke-width: 2.5; filter: url(#sketchy); rx: 8px; }
    .model-text { font-size: 14px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; }
    
    .shape { stroke: #1e1e1e; stroke-width: 2; filter: url(#sketchy); }
    .tag { fill: #fff; stroke: #1e1e1e; stroke-width: 1.5; filter: url(#sketchy); }
    .flow-line { fill: none; stroke: #1e1e1e; stroke-width: 2.5; marker-end: url(#arrow); filter: url(#sketchy); }
    .dashed-line { fill: none; stroke: #1e1e1e; stroke-width: 2.5; stroke-dasharray: 6 4; marker-end: url(#arrow); filter: url(#sketchy); }
    .cluster { fill: none; stroke: #868e96; stroke-width: 2; stroke-dasharray: 8 6; filter: url(#sketchy); }
  </style>

  <text x="525" y="50" font-size="34" font-weight="bold" fill="#1e1e1e" text-anchor="middle" filter="url(#sketchy)">Types of Machine Learning</text>
  <line x1="320" y1="65" x2="730" y2="60" stroke="#1e1e1e" stroke-width="3" filter="url(#sketchy)"/>

  <g transform="translate(40, 100)">
    <rect class="card-border" width="460" height="340" />
    <text x="30" y="40" class="title">1. Supervised</text>
    <text x="30" y="65" class="subtitle">"Learning with a Teacher"</text>

    <text x="85" y="115" class="label">Data + Labels</text>
    <rect class="box" x="40" y="130" width="90" height="100" />
    
    <circle cx="70" cy="160" r="14" fill="#339af0" class="shape"/>
    <rect x="90" y="150" width="14" height="14" class="tag" rx="2"/><text x="97" y="161" font-size="12" text-anchor="middle">A</text>
    <polygon points="70,185 55,210 85,210" fill="#ff6b6b" class="shape"/>
    <rect x="90" y="190" width="14" height="14" class="tag" rx="2"/><text x="97" y="201" font-size="12" text-anchor="middle">B</text>

    <path d="M 140,180 L 190,180" class="flow-line" />

    <text x="235" y="115" class="label">Algorithm</text>
    <rect class="model-box" x="200" y="140" width="70" height="80" />
    <text x="235" y="185" class="model-text">LEARN</text>

    <path d="M 280,180 L 330,180" class="flow-line" />

    <text x="385" y="115" class="label">Prediction</text>
    <rect class="box" x="340" y="130" width="90" height="100" />
    <circle cx="385" cy="165" r="14" fill="#339af0" class="shape"/>
    <path d="M 385,185 L 385,200" class="flow-line" stroke-width="2"/>
    <rect x="365" y="205" width="40" height="18" class="tag" rx="3"/><text x="385" y="218" font-size="12" text-anchor="middle" font-weight="bold">"It's A"</text>

    <text x="230" y="280" class="desc">We provide the answers (labels).</text>
    <text x="230" y="305" class="desc">The machine learns the rules.</text>
  </g>

  <g transform="translate(530, 100)">
    <rect class="card-border" width="460" height="340" />
    <text x="30" y="40" class="title">2. Unsupervised</text>
    <text x="30" y="65" class="subtitle">"Discovering Hidden Patterns"</text>

    <text x="85" y="115" class="label">Raw Data</text>
    <rect class="box" x="40" y="130" width="90" height="100" />
    <circle cx="65" cy="155" r="10" fill="#ced4da" class="shape"/>
    <rect x="90" y="145" width="16" height="16" fill="#ced4da" class="shape" rx="2"/>
    <polygon points="75,200 60,215 90,215" fill="#ced4da" class="shape"/>
    <circle cx="95" cy="180" r="8" fill="#ced4da" class="shape"/>
    <rect x="55" y="175" width="12" height="12" fill="#ced4da" class="shape" rx="2"/>

    <path d="M 140,180 L 190,180" class="flow-line" />

    <text x="235" y="115" class="label">Algorithm</text>
    <rect class="model-box" x="200" y="140" width="70" height="80" />
    <text x="235" y="185" class="model-text">SORT</text>

    <path d="M 280,180 L 330,180" class="flow-line" />

    <text x="385" y="115" class="label">Clusters</text>
    <rect class="box" x="340" y="130" width="90" height="100" />
    <ellipse cx="365" cy="160" rx="20" ry="15" class="cluster"/>
    <circle cx="360" cy="155" r="6" fill="#ced4da" class="shape"/>
    <circle cx="372" cy="162" r="5" fill="#ced4da" class="shape"/>
    
    <ellipse cx="395" cy="195" rx="22" ry="18" class="cluster"/>
    <rect x="382" y="185" width="10" height="10" fill="#ced4da" class="shape" rx="2"/>
    <rect x="398" y="195" width="12" height="12" fill="#ced4da" class="shape" rx="2"/>

    <text x="230" y="280" class="desc">No answers are provided.</text>
    <text x="230" y="305" class="desc">The machine groups similar items naturally.</text>
  </g>

  <g transform="translate(40, 470)">
    <rect class="card-border" width="460" height="340" />
    <text x="30" y="40" class="title">3. Semi-Supervised</text>
    <text x="30" y="65" class="subtitle">"The Practical Middle Ground"</text>

    <text x="85" y="115" class="label">Mixed Data</text>
    <rect class="box" x="40" y="130" width="90" height="100" />
    <circle cx="65" cy="155" r="10" fill="#339af0" class="shape"/><text x="65" y="159" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">A</text>
    <polygon points="90,180 80,200 100,200" fill="#ff6b6b" class="shape"/><text x="90" y="196" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">B</text>
    <circle cx="85" cy="145" r="4" fill="#adb5bd" class="shape"/>
    <circle cx="110" cy="160" r="5" fill="#adb5bd" class="shape"/>
    <circle cx="50" cy="185" r="4" fill="#adb5bd" class="shape"/>
    <circle cx="70" cy="205" r="5" fill="#adb5bd" class="shape"/>
    <circle cx="105" cy="210" r="4" fill="#adb5bd" class="shape"/>

    <path d="M 140,180 L 180,180" class="flow-line" />

    <text x="235" y="115" class="label">Algorithm</text>
    <rect class="model-box" x="190" y="140" width="90" height="80" />
    <path d="M 235,130 C 275,100 285,160 250,150" class="dashed-line" /> <text x="235" y="185" class="model-text">BOOTSTRAP</text>

    <path d="M 290,180 L 330,180" class="flow-line" />

    <text x="385" y="115" class="label">Fully Sorted</text>
    <rect class="box" x="340" y="130" width="90" height="100" />
    <path d="M 345,210 Q 385,180 425,140" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="6 4" filter="url(#sketchy)"/>
    <circle cx="365" cy="160" r="8" fill="#339af0" class="shape"/>
    <circle cx="380" cy="145" r="6" fill="#339af0" class="shape"/>
    <polygon points="390,185 380,205 400,205" fill="#ff6b6b" class="shape"/>
    <polygon points="415,170 405,190 425,190" fill="#ff6b6b" class="shape"/>

    <text x="230" y="280" class="desc">A few labeled examples guide the sorting</text>
    <text x="230" y="305" class="desc">of a massive unlabeled dataset.</text>
  </g>

  <g transform="translate(530, 470)">
    <rect class="card-border" width="460" height="340" />
    <text x="30" y="40" class="title">4. Reinforcement</text>
    <text x="30" y="65" class="subtitle">"Learning by Trial &amp; Error"</text>

    <text x="110" y="125" class="label">Learner</text>
    <rect class="model-box" x="65" y="140" width="90" height="70" />
    <circle cx="95" cy="165" r="5" fill="#1e1e1e" filter="url(#sketchy)"/>
    <circle cx="125" cy="165" r="5" fill="#1e1e1e" filter="url(#sketchy)"/>
    <path d="M 100,185 Q 110,195 120,185" fill="none" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round" filter="url(#sketchy)"/>

    <text x="350" y="125" class="label">Environment</text>
    <rect class="box" x="295" y="140" width="110" height="90" />
    <line x1="331" y1="140" x2="331" y2="230" stroke="#1e1e1e" stroke-width="2" filter="url(#sketchy)"/>
    <line x1="368" y1="140" x2="368" y2="230" stroke="#1e1e1e" stroke-width="2" filter="url(#sketchy)"/>
    <line x1="295" y1="185" x2="405" y2="185" stroke="#1e1e1e" stroke-width="2" filter="url(#sketchy)"/>
    <circle cx="313" cy="207" r="8" fill="#339af0" class="shape"/>
    <rect x="331" y="185" width="37" height="45" fill="#495057" class="shape"/>
    <polygon points="386,145 389,153 397,153 391,158 393,166 386,161 379,166 381,158 375,153 383,153" fill="#fcc419" class="shape"/>

    <path d="M 140,145 Q 220,95 305,145" class="flow-line" />
    <rect x="185" y="105" width="70" height="25" fill="#fff" class="shape" rx="4"/>
    <text x="220" y="122" font-size="12" font-weight="bold" fill="#1e1e1e" text-anchor="middle">ACTION</text>

    <path d="M 305,215 Q 220,265 140,215" class="flow-line" stroke-dasharray="6 4" />
    <rect x="160" y="225" width="120" height="25" fill="#fff" class="shape" rx="4"/>
    <text x="220" y="242" font-size="12" font-weight="bold" fill="#ff6b6b" text-anchor="middle">REWARD (+ / -)</text>

    <text x="230" y="295" class="desc">The Learner takes actions. Rewards and penalties</text>
    <text x="230" y="320" class="desc">teach it the optimal strategy over time.</text>
  </g>

</svg>
