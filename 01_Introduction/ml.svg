<svg viewBox="30 15 860 250" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background-color:#ffffff; font-family:'Virgil', 'Comic Sans MS', 'Chalkboard SE', 'Bradley Hand', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1,1 L 9,5 L 1,9" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#sketchy)" />
    </marker>
  </defs>

  <style>
    .box { fill: #f8f9fa; stroke: #1e1e1e; stroke-width: 2.5; filter: url(#sketchy); rx: 12px; }
    .title { font-size: 20px; font-weight: bold; fill: #1e1e1e; text-anchor: middle; letter-spacing: 0.5px; }
    .desc { font-size: 16px; fill: #495057; text-anchor: middle; }
    .arrow-line { fill: none; stroke: #1e1e1e; stroke-width: 3; marker-end: url(#arrow); filter: url(#sketchy); }
    .icon { stroke: #1e1e1e; stroke-width: 2.5; fill: none; filter: url(#sketchy); stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <text x="460" y="40" font-size="24" font-weight="bold" fill="#1e1e1e" text-anchor="middle" filter="url(#sketchy)">The Machine Learning Process</text>

  <rect class="box" fill="#e7f5ff" x="40" y="70" width="220" height="180" />
  <text x="150" y="105" class="title">1. Dataset</text>
  
  <g transform="translate(110, 125)">
    <rect x="0" y="0" width="60" height="50" class="icon" rx="4" />
    <line x1="0" y1="16" x2="60" y2="16" class="icon" />
    <line x1="0" y1="33" x2="60" y2="33" class="icon" />
    <line x1="20" y1="0" x2="20" y2="50" class="icon" />
    <line x1="40" y1="0" x2="40" y2="50" class="icon" />
  </g>
  
  <text x="150" y="210" class="desc">Gather examples</text>
  <text x="150" y="230" class="desc">(from nature/humans/algo)</text>

  <path d="M 270,160 Q 305,145 340,160" class="arrow-line" />
  <text x="305" y="145" font-size="15" fill="#1e1e1e" text-anchor="middle" font-weight="bold" filter="url(#sketchy)">Algorithm</text>

  <rect class="box" fill="#fff4e6" x="350" y="70" width="220" height="180" />
  <text x="460" y="105" class="title">2. Statistical Model</text>
  
  <g transform="translate(425, 125)">
    <rect x="0" y="0" width="50" height="50" class="icon" rx="8" />
    <circle cx="25" cy="25" r="10" class="icon" />
    <line x1="25" y1="5" x2="25" y2="15" class="icon" />
    <line x1="25" y1="35" x2="25" y2="45" class="icon" />
    <line x1="5" y1="25" x2="15" y2="25" class="icon" />
    <line x1="35" y1="25" x2="45" y2="25" class="icon" />
    <rect x="35" y="-10" width="35" height="20" fill="#fff" class="icon" rx="3"/>
    <text x="52" y="5" font-size="14" font-style="italic" fill="#1e1e1e" text-anchor="middle" font-family="'Times New Roman', serif">f(x)</text>
  </g>

  <text x="460" y="210" class="desc">Built automatically</text>
  <text x="460" y="230" class="desc">based on the data</text>

  <path d="M 580,160 Q 615,175 650,160" class="arrow-line" />
  <text x="615" y="145" font-size="15" fill="#1e1e1e" text-anchor="middle" font-weight="bold" filter="url(#sketchy)">Used to</text>

  <rect class="box" fill="#d3f9d8" x="660" y="70" width="220" height="180" />
  <text x="770" y="105" class="title">3. Practical Problem</text>
  
  <g transform="translate(740, 125)">
    <circle cx="25" cy="25" r="22" class="icon" />
    <circle cx="25" cy="25" r="12" class="icon" />
    <circle cx="25" cy="25" r="3" fill="#1e1e1e" class="icon" />
    <line x1="55" y1="-5" x2="32" y2="18" class="icon" />
    <polygon points="30,12 25,25 38,20" fill="#1e1e1e" filter="url(#sketchy)"/>
  </g>

  <text x="770" y="210" class="desc">Model is applied to</text>
  <text x="770" y="230" class="desc">solve the objective</text>

</svg>
